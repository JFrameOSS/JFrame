# JFrame Quarkus OTLP — default configuration
# These defaults match the Spring Boot jframe-otlp equivalents.
# Override in your application's application.properties.

# ===================== JFRAME OTLP CONFIGURATION =====================
jframe.otlp.disabled=false
jframe.otlp.url=http://localhost:4318
jframe.otlp.timeout=10s
jframe.otlp.exporter=otlp
jframe.otlp.sampling-rate=1.0
jframe.otlp.excluded-methods=health,actuator,ping,status,info,metrics

# ===================== QUARKUS OPENTELEMETRY =====================
quarkus.otel.enabled=true
quarkus.otel.propagators=${jframe.otlp.propagators:tracecontext,baggage}

# Resource attributes
quarkus.otel.service.name=${jframe.application.name:unknown}-${jframe.application.environment:dev}
quarkus.otel.resource.attributes=service.name=${jframe.application.name:unknown},service.version=${jframe.application.version:unknown},service.namespace=${jframe.application.group:unknown},deployment.environment=${jframe.application.environment:dev}

# Exporter
quarkus.otel.exporter.otlp.endpoint=${jframe.otlp.url:http://localhost:4318}
quarkus.otel.exporter.otlp.timeout=${jframe.otlp.timeout:10s}
quarkus.otel.exporter.otlp.protocol=http/protobuf
quarkus.otel.exporter.otlp.compression=gzip

# Traces, metrics, logs
quarkus.otel.traces.exporter=cdi
quarkus.otel.traces.sampler=traceidratio
quarkus.otel.traces.sampler.arg=${jframe.otlp.sampling-rate:1.0}
quarkus.otel.metrics.exporter=cdi
quarkus.otel.logs.exporter=cdi

# ===================== AUTO-INSTRUMENTATION =====================
# Match Spring OTLP module defaults (otel.instrumentation.* equivalents)
# https://quarkus.io/guides/opentelemetry-tracing

# JDBC — enables SQL query spans (Spring equivalent: otel.instrumentation.jdbc.enabled)
quarkus.datasource.jdbc.telemetry=true

# REST server — incoming HTTP request spans (Spring equivalent: otel.instrumentation.spring-webmvc.enabled)
quarkus.otel.instrument.resteasy=true

# REST client — outgoing HTTP request spans (Spring equivalent: otel.instrumentation.spring-web.enabled)
quarkus.otel.instrument.resteasy-client=true

# gRPC — enabled by default in Quarkus (no Spring equivalent)
quarkus.otel.instrument.grpc=true

# Messaging — Kafka, RabbitMQ spans (Spring equivalent: otel.instrumentation.kafka.enabled)
quarkus.otel.instrument.messaging=true

# Vert.x HTTP — enabled by default in Quarkus
quarkus.otel.instrument.rest=true

# ===================== FILTER CONFIGURATION =====================
jframe.logging.filters.tracing-response.enabled=true
