# JFrame Quarkus OTLP default configuration
# These defaults match the Spring Boot jframe-properties.yml equivalents.
# Override in your application's application.properties.

# ===================== JFRAME OTLP CONFIGURATION =====================
jframe.otlp.disabled=true
jframe.otlp.url=http://localhost:4318
jframe.otlp.timeout=10s
jframe.otlp.exporter=otlp
jframe.otlp.sampling-rate=1.0
jframe.otlp.excluded-methods=health,actuator,ping,status,info,metrics
jframe.otlp.auto-trace=true

# ===================== QUARKUS OPENTELEMETRY =====================
# Mapped from Spring's otel.* properties to Quarkus equivalents.
# Note: quarkus.otel.enabled uses inverted logic vs jframe.otlp.disabled.
# Both default to "off" — set quarkus.otel.enabled=true to activate.
quarkus.otel.enabled=true
quarkus.otel.propagators=tracecontext,b3,jaeger

# Resource attributes (single comma-separated value — Quarkus does not support nested keys)
quarkus.otel.resource.attributes=service.name=${jframe.application.name:unknown},service.version=${jframe.application.version:unknown},service.namespace=${jframe.application.group:},deployment.environment=${jframe.application.environment:dev}

# Exporter
quarkus.otel.exporter.otlp.endpoint=${jframe.otlp.url:http://localhost:4318}
quarkus.otel.exporter.otlp.timeout=${jframe.otlp.timeout:10s}
quarkus.otel.exporter.otlp.protocol=http/protobuf
quarkus.otel.exporter.otlp.compression=gzip

# Traces, metrics, logs
quarkus.otel.traces.exporter=cdi
quarkus.otel.traces.sampler=traceidratio
quarkus.otel.traces.sampler.arg=${jframe.otlp.sampling-rate:1.0}
quarkus.otel.metrics.exporter=cdi
quarkus.otel.logs.exporter=cdi

# ===================== FILTER CONFIGURATION =====================
jframe.logging.filters.tracing-response.enabled=true
jframe.logging.filters.outbound-tracing.enabled=true
