# JFrame Quarkus Core — default configuration
# These defaults match the Spring Boot jframe-properties.yml equivalents.
# Override in your application's application.properties.

# ===================== APPLICATION METADATA =====================
jframe.application.environment=dev
# jframe.application.name=       (required — set in your application.properties)
# jframe.application.group=      (required — set in your application.properties)
# jframe.application.version=    (required — set in your application.properties)
jframe.application.url=http://localhost:8080

# ===================== REQUEST/RESPONSE LOGGING =====================
jframe.logging.disabled=false
jframe.logging.response-length=-1
jframe.logging.body-excluded-content-types=multipart/form-data
jframe.logging.exclude-paths=/actuator/*
jframe.logging.fields-to-mask=password,keyPassphrase,client_secret,secret
jframe.logging.allowed-content-types=application/json,application/graphql+json,application/hal+json,application/problem+json,application/vnd.spring-boot.actuator.v1+json,application/vnd.spring-boot.actuator.v3+json,application/vnd.spring-cloud.config-server.v2+json,application/x-www-form-urlencoded,application/xml,multipart/form-data,text/plain,text/xml
